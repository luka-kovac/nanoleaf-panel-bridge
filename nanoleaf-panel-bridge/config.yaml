name: Nanoleaf Panel Bridge
version: "0.1.11"
slug: nanoleaf_panel_bridge
description: Expose Nanoleaf Shapes panels and configurable zones as MQTT lights
startup: services
boot: auto
init: false

arch:
  - aarch64
  - amd64

options:
  nanoleaf_ip: "192.168.xxx.xxx"
  nanoleaf_token: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  output_mode: "stream"
  stream_fps: 25
  stream_transition_time: 1
  render_on_startup: false
  global_brightness_value: 100
  remember_effect_brightness: true
  sync_global_state: true
  global_sync_interval_seconds: 5
  enable_bridge_effects: true
  sparkle_effect_name: "Bridge Sparkle"
  sparkle_interval_seconds: 0.12
  sparkle_min_multiplier: 0.35
  sparkle_max_multiplier: 1.0
  sparkle_smoothing: 0.65
  enable_layout_preview: true
  layout_preview_debounce_seconds: 0.25
  layout_preview_padding: 24
  layout_preview_panel_radius_multiplier: 0.42
  layout_preview_min_panel_radius: 18.0
  layout_preview_labels: true
  layout_preview_background: "#101418"
  layout_preview_stroke: "#d7dde5"
  enable_painter_brush: true
  painter_brush_name: "Panel Painter Brush"
  painter_brush_default_brightness: 200
  painter_brush_default_color: "#ff66cc"
  zones: []

schema:
  nanoleaf_ip: str
  nanoleaf_token: password
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: password
  output_mode: list(stream|rest)
  stream_fps: int
  stream_transition_time: int
  render_on_startup: bool
  global_brightness_value: int
  remember_effect_brightness: bool
  sync_global_state: bool
  global_sync_interval_seconds: int
  enable_bridge_effects: bool
  sparkle_effect_name: str
  sparkle_interval_seconds: float
  sparkle_min_multiplier: float
  sparkle_max_multiplier: float
  sparkle_smoothing: float
  enable_layout_preview: bool
  layout_preview_debounce_seconds: float
  layout_preview_padding: int
  layout_preview_panel_radius_multiplier: float
  layout_preview_min_panel_radius: float
  layout_preview_labels: bool
  layout_preview_background: str
  layout_preview_stroke: str
  enable_painter_brush: bool
  painter_brush_name: str
  painter_brush_default_brightness: int
  painter_brush_default_color: str
  zones:
    - id: str
      name: str
      panels:
        - int
      brightness_multiplier: float?
      max_brightness: int?
